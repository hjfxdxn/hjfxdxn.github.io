  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="index.html#home" aria-label="Kevin Wang home">

        <span class="brand-text">Kevin Wang</span>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="Open navigation">

        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="subpage-hero section-muted">
      <div class="section-inner">
        <p class="section-kicker" data-i18n="photos.kicker">Photo Exhibition</p>
        <h1 data-i18n="photos.title">Photo exhibition</h1>
        <p data-i18n="photos.note">A visual archive for engineering details, campus life, travel, cycling, and skiing.</p>
      </div>
    </section>

    <section class="section">
      <div class="section-inner">
        <div class="gallery-grid natural-gallery">
          <figure tabindex="0"><img src="assets/images/activity/cycling-fuji-view.jpg" alt="Cycling with Mount Fuji view"><figcaption>Fuji view ride</figcaption></figure>
          <figure tabindex="0"><img src="assets/images/activity/cycling-road-action.jpg" alt="Road cycling action"><figcaption>Road action</figcaption></figure>
          <figure tabindex="0"><img src="assets/images/activity/cycling-shimanami-kaido.jpg" alt="Shimanami Kaido cycling"><figcaption>Shimanami Kaido</figcaption></figure>
          <figure tabindex="0"><img src="assets/images/activity/skiing-snow-turn.jpg" alt="Ski turn in snow"><figcaption>Snow turn</figcaption></figure>
          <figure tabindex="0"><img src="assets/images/activity/skiing-slope-carve.jpg" alt="Ski carving on slope"><figcaption>Slope carving</figcaption></figure>
          <figure tabindex="0"><img src="assets/images/activity/skiing-groomed-run.jpg" alt="Skiing on groomed run"><figcaption>Groomed run</figcaption></figure>
          <figure tabindex="0"><img src="assets/images/activity/cycling-fuji-hillclimb-finish.jpg" alt="Fuji Hill Climb finish"><figcaption>Fuji Hill Climb</figcaption></figure>
          <figure tabindex="0"><img src="assets/images/activity/cycling-summit-bike.jpg" alt="Cycling summit record"><figcaption>Summit record</figcaption></figure>
        </div>
      </div>
    </section>
